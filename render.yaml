services:
  - type: web
    name: portfolio-evaluator-api
    runtime: node
    rootDir: portfolio-evaluator/server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
